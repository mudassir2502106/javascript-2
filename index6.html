<html>
    <head>
        <title>
javascript practise
        </title>
    </head>
    <body>
        <h1>Promisification</h1>
        <script>

            function checkStatus(callback) {
    setTimeout(() => {
        callback("Status OK");
    }, 2000);
}

function checkStatusPromise() {
    return new Promise((resolve) => {
        checkStatus(resolve);
    });
}

checkStatusPromise()
    .then(result => console.log(result));
        </script>
    </body>
</html>
