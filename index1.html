<html>
    <head>
        <title>
javascript practise
        </title>
    </head>
    <body>
        <h1>Callbacks</h1>
        <script>
function sayHello(name, callback) {
    setTimeout(() => {
        callback(`Hello ${name}! Welcome!`);
    }, 3000);
}

sayHello("Ayesha", function(message) {
    console.log(message);
});

        </script>
    </body>
</html>
