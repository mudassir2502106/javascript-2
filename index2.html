<html>
    <head>
        <title>
javascript practise
        </title>
    </head>
    <body>
        <h1>Promises</h1>
        <script>
const downloadImage = new Promise((resolve, reject) => {
    let success = true;

    setTimeout(() => {
        if (success) {
            resolve("https://example.com/image.jpg");
        } else {
            reject("Download failed!");
        }
    }, 2000);
});

downloadImage
    .then(url => console.log("Image downloaded from:", url))
    .catch(error => console.log(error));
            
        </script>
    </body>
</html>
