        <h1>ArrayBuffer & TextDecoder</h1>
        <script>
const buffer = new ArrayBuffer(16);
const view = new Uint8Array(buffer);

for (let i = 0; i < view.length; i++) {
    view[i] = i + 65;
}

const decoder = new TextDecoder();
console.log(decoder.decode(buffer));
            
        </script>
